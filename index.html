<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>轩心华 · Design Portfolio</title>
  <meta name="description" content="轩心华的作品集 · Design Portfolio" />

  <!-- Preload critical above-fold assets -->
  <link rel="preload" as="image" href="assets/bg.jpg" />
  <link rel="preload" as="image" href="assets/bg1.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
  <!-- Inline override for max-width -->
  <style>
    section { background: #000000 !important; }
    .section-project,
    .section-resume {
      width: 100% !important;
      max-width: 1200px !important;
      margin: 0 auto !important;
      display: block !important;
    }
    .project-container {
      width: 100% !important;
      max-width: 1200px !important;
      margin: 0 auto !important;
    }
    .biaoqing-anchor,
    .wenwuanfang-anchor,
    .jianguanpingtai-anchor {
      width: 100% !important;
      max-width: 1200px !important;
      margin: 0 auto !important;
    }
    html, body { background: #000000 !important; }
  </style>
</head>
<body>

  <!-- ===== Navigation ===== -->
  <nav class="nav" id="navbar">
    <div class="nav-inner">
      <a href="#" class="nav-logo">XXH</a>
      <ul class="nav-links">
        <li class="nav-item-dropdown">
          <a href="#projects" class="nav-link">作品</a>
          <ul class="nav-dropdown">
            <li><a href="#projects">Behavior</a></li>
            <li><a href="#tnc">TNC</a></li>
            <li><a href="#bowenAI">博问AI</a></li>
            <li><a href="#wenwuanfang">综合文物安防平台</a></li>
            <li><a href="#jianguanpingtai">文物安全监管平台</a></li>

        </li>
        <li><a href="#about" class="nav-link">关于</a></li>
        <li><a href="#contact" class="nav-link">联系</a></li>
      </ul>
    </div>
  </nav>

  <!-- ===== Hero Section ===== -->
  <section class="hero" id="hero">

    <!-- Background image -->
    <div class="hero-bg"></div>

    <!-- WebGL Canvas for Side Rays -->
    <canvas class="hero-canvas" id="heroCanvas"></canvas>

    <!-- Ambient glow overlay -->
    <div class="hero-glow"></div>

    <!-- SVG text layer (above beam layer) -->
    <img class="hero-svg-text" loading="eager" fetchpriority="high" src="assets/bg1.svg" alt="轩心华 · Design Portfolio" />

    <!-- Scroll indicator -->
    <div class="scroll-indicator" id="scrollIndicator">
      <span class="scroll-text">滚动探索</span>
      <svg class="scroll-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 4v12M10 16l-5-5M10 16l5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

  </section>
  <!-- ===== Personal Resume ===== -->
  <section class="section section-resume" id="about">
    <img class="resume-image" loading="eager" fetchpriority="high" src="assets/jianjie.jpg" alt="个人简历" />
  </section>

  <!-- ===== Project: Behavior ===== -->
  <section class="section section-alt section-project" id="projects">
    <div class="project-container">
      <div class="project-gallery">
        <img loading="lazy" decoding="async" src="assets/behavior/1.svg" alt="" />
        <img loading="lazy" decoding="async" src="assets/behavior/2.jpg" alt="" />
        <img loading="lazy" decoding="async" src="assets/behavior/3.jpg" alt="" />
        <img loading="lazy" decoding="async" src="assets/behavior/4.jpg" alt="" />
        <img loading="lazy" decoding="async" src="assets/behavior/5.jpg" alt="" />
        <img loading="lazy" decoding="async" src="assets/behavior/6.jpg" alt="" />
      </div>
    </div>
  </section>

        <img loading="lazy" decoding="async" src="assets/TNC/3.jpg" alt="" />

                  <path d="M8 4L4 10L8 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M12 4L16 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          </div>
          <p class="comparison-label">← 深 · 浅 →</p>
