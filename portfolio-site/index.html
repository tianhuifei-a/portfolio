<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轩心华 — UI/UX 设计作品集</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:#f5f5f5;color:#222;-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 2rem;display:flex;justify-content:space-between;align-items:center;background:rgba(245,245,245,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #e0e0e0;height:52px}
.nav-logo{font-weight:700;font-size:.85rem;letter-spacing:.03em;white-space:nowrap;cursor:pointer;user-select:none}
.nav-links{display:flex;gap:0;height:52px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-links::-webkit-scrollbar{display:none}
.nav-links a{display:flex;align-items:center;padding:0 1rem;font-size:.78rem;color:#888;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s;text-decoration:none;cursor:pointer;flex-shrink:0}
.nav-links a:hover,.nav-links a.active{color:#222;border-bottom-color:#222}
.work-image{width:100%;display:block;background:#eee;line-height:0}
.work-image img{width:100%;height:auto;display:block}
.header-spacer{height:52px}
@media(max-width:768px){
nav{padding:0 .5rem}
.nav-links a{padding:0 .6rem;font-size:.72rem}
}
</style>
</head>
<body>
<nav id="navbar">
<span class="nav-logo" id="logoBtn">轩心华UI/UX作品集</span>
<div class="nav-links" id="navLinks">
<a class="active">首页</a>
<a>Behavior工具</a>
<a>TNC工具</a>
<a>博问AI</a>
<a>预防性保护系统</a>
<a>文物安全监管平台</a>
</div>
</nav>
<div class="header-spacer"></div>

<div class="work-image" data-nav="首页"><img src="images/0.jpg" alt="" loading="lazy"></div>
<div class="work-image" data-nav="Behavior工具"><img src="images/1.1.jpg" alt="" loading="lazy"></div>
<div class="work-image"><img src="images/1.2.jpg" alt="" loading="lazy"></div>
<div class="work-image" data-nav="TNC工具"><img src="images/2.1.1.jpg" alt="" loading="lazy"></div>
<div class="work-image"><img src="images/2.1.2.jpg" alt="" loading="lazy"></div>
<div class="work-image"><img src="images/2.2.jpg" alt="" loading="lazy"></div>
<div class="work-image" data-nav="博问AI"><img src="images/3.1.1.jpg" alt="" loading="lazy"></div>
<div class="work-image"><img src="images/3.1.2.jpg" alt="" loading="lazy"></div>
<div class="work-image"><img src="images/3.2.jpg" alt="" loading="lazy"></div>
<div class="work-image" data-nav="预防性保护系统"><img src="images/4.jpg" alt="" loading="lazy"></div>
<div class="work-image" data-nav="文物安全监管平台"><img src="images/5.jpg" alt="" loading="lazy"></div>

<script>
var links = document.querySelectorAll('.nav-links a');
var navEl = document.getElementById('navbar');
var navH = 52;
var navNames = ['首页','Behavior工具','TNC工具','博问AI','预防性保护系统','文物安全监管平台'];

links.forEach(function(link){
link.addEventListener('click', function(){
var name = this.textContent.trim();
var targets = document.querySelectorAll('[data-nav="'+name+'"]');
if(targets.length === 0) return;
var target = targets[0];
var top = target.getBoundingClientRect().top + window.pageYOffset - navH;
window.scrollTo({top: top, behavior: 'smooth'});
links.forEach(function(l){l.classList.remove('active')});
this.classList.add('active');
});
});

var observer = new IntersectionObserver(function(entries){
entries.forEach(function(e){
if(e.isIntersecting){
var nav = e.target.getAttribute('data-nav');
if(nav){
links.forEach(function(l){l.classList.remove('active')});
links.forEach(function(l){
if(l.textContent.trim() === nav) l.classList.add('active');
});
}
}
});
}, {rootMargin: '-'+navH+'px 0px -60% 0px'});

document.querySelectorAll('[data-nav]').forEach(function(el){observer.observe(el)});

document.getElementById('logoBtn').addEventListener('click', function(){
window.scrollTo({top:0,behavior:'smooth'});
links.forEach(function(l){l.classList.remove('active')});
links[0].classList.add('active');
});

var lastY = 0;
window.addEventListener('scroll', function(){
var y = window.pageYOffset;
navEl.classList.toggle('hidden', y > lastY && y > 80);
lastY = y;
}, {passive:true});

if(window.location.hash) history.replaceState(null,'',window.location.pathname);
</script>
</body>
</html>
